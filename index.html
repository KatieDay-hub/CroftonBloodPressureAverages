<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood Pressure Averages</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #fff; color: #222; }
    h1 { margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 12px; }
    label { font-weight: bold; display: block; margin-bottom: 4px; }
    input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 10px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .btn-primary { background: #005eb8; color: #fff; }
    .btn-secondary { background: #e8eef7; color: #005eb8; }
    .btn-danger { background: #e74c3c; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    tfoot td { font-weight: bold; }
    .version { color:#666; font-size:12px; margin-top:8px; }
  </style>
</head>
<body>
  <h1>Blood Pressure Averages</h1>

  <!-- Patient Details Section -->
  <div class="grid">
    <div>
      <label for="patientName">Patient Name</label>
      <input type="text" id="patientName" placeholder="Enter full name" />
    </div>
    <div>
      <label for="patientDOB">Date of Birth</label>
      <input type="date" id="patientDOB" />
      <div class="hint">Displayed & emailed as <strong>DD/MM/YYYY</strong></div>
    </div>
    <div>
      <label for="patientAddress">Address</label>
      <input type="text" id="patientAddress" placeholder="Enter address" />
    </div>
  </div>

  <!-- BP Input Section -->
  <div class="grid">
    <div>
      <label for="readingDate">Date</label>
      <input type="date" id="readingDate" />
    </div>
    <div>
      <label for="systolic">Systolic (mmHg)</label>
      <input type="number" id="systolic" min="50" max="250" />
    </div>
    <div>
      <label for="diastolic">Diastolic (mmHg)</label>
      <input type="number" id="diastolic" min="30" max="150" />
    </div>
    <div>
      <label for="notes">Notes</label>
      <input type="text" id="notes" placeholder="Optional notes" />
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="addReading()">Add Reading</button>
    <button class="btn-secondary" onclick="clearReadings()">Clear All Readings</button>
    <button class="btn-secondary" onclick="sendEmail()">Send Readings via Email</button>
  </div>

  <table id="readingsTable">
    <thead>
      <tr>
        <th>Date (dd-mm-yyyy)</th>
        <th>Systolic</th>
        <th>Diastolic</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr>
        <td>—</td>
        <td id="avgSystolic">–</td>
        <td id="avgDiastolic">–</td>
        <td colspan="2">Average (mmHg)</td>
      </tr>
    </tfoot>
  </table>

  <script>
    // --- Date helpers ---
    function toISOFromPicker(input){
      const d = input.valueAsDate;
      if(d instanceof Date){
        // Use UTC components to avoid timezone shifts
        const y=d.getUTCFullYear();
        const m=String(d.getUTCMonth()+1).padStart(2,'0');
        const day=String(d.getUTCDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
      }
      return input.value; // fallback
    }
    function isoToUKDash(iso){
      const m = /^([0-9]{4})-([0-9]{2})-([0-9]{2})$/.exec(iso);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : iso;   // dd-mm-yyyy
    }
    function isoToUKSlash(iso){
      const m = /^([0-9]{4})-([0-9]{2})-([0-9]{2})$/.exec(iso);
      return m ? `${m[3]}/${m[2]}/${m[1]}` : iso;   // DD/MM/YYYY
    }
    function dashToSlashUK(ddmmyyyy){
      // replace all '-' with '/' without using replaceAll (Safari compat)
      return ddmmyyyy.split('-').join('/');
    }

    // Prefill today for reading date
    (function initDate(){
      const today = new Date();
      const iso = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const rd=document.getElementById('readingDate');
      if(rd && !rd.value) rd.value = iso;
    })();

    function addReading(){
      const dateEl=document.getElementById('readingDate');
      const sEl=document.getElementById('systolic');
      const dEl=document.getElementById('diastolic');
      const nEl=document.getElementById('notes');

      const isoDate=toISOFromPicker(dateEl);
      const ukDate=isoToUKDash(isoDate); // dd-mm-yyyy in the table
      const sVal=sEl.value.trim();
      const dVal=dEl.value.trim();
      const nVal=nEl.value.trim();

      if(!isoDate){alert('Please select a date.'); return;}
      if(!sVal||!dVal){alert('Please enter systolic and diastolic values.'); return;}

      const tbody=document.querySelector('#readingsTable tbody');
      const row=document.createElement('tr');
      row.innerHTML=`<td>${ukDate}</td><td>${sVal}</td><td>${dVal}</td><td>${nVal}</td><td><button class='btn-danger' onclick='this.closest("tr").remove();updateAverages();'>Delete</button></td>`;
      tbody.appendChild(row);

      sEl.value=''; dEl.value=''; nEl.value=''; updateAverages();
    }

    function clearReadings(){
      document.querySelector('#readingsTable tbody').innerHTML='';
      updateAverages();
    }

    function updateAverages(){
      const rows=document.querySelectorAll('#readingsTable tbody tr');
      let totalS=0,totalD=0,count=0;
      rows.forEach(r=>{
        const cells=r.querySelectorAll('td');
        const s=Number(cells[1].textContent);
        const d=Number(cells[2].textContent);
        if(!isNaN(s)&&!isNaN(d)){totalS+=s;totalD+=d;count++;}
      });
      document.getElementById('avgSystolic').textContent=count?Math.round(totalS/count):'–';
      document.getElementById('avgDiastolic').textContent=count?Math.round(totalD/count):'–';
    }

    function sendEmail(){
      const name=document.getElementById('patientName').value.trim();
      const dobISO=document.getElementById('patientDOB').value; // yyyy-mm-dd
      const dobUK = isoToUKSlash(dobISO); // DD/MM/YYYY for email
      const address=document.getElementById('patientAddress').value.trim();

      let body=`Patient Details:\nName: ${name}\nDate of Birth: ${dobUK}\nAddress: ${address}\n\nBlood Pressure Readings:\n`;

      const rows=document.querySelectorAll('#readingsTable tbody tr');
      rows.forEach((r,i)=>{
        const cells=r.querySelectorAll('td');
        // cells[0] is dd-mm-yyyy; convert to DD/MM/YYYY for email
        const dateUKSlash = dashToSlashUK(cells[0].textContent);
        body+=`${i+1}. Date: ${dateUKSlash}, Systolic: ${cells[1].textContent}, Diastolic: ${cells[2].textContent}${cells[3].textContent?`, Notes: ${cells[3].textContent}`:''}\n`;
      });

      body+=`\nAverage Systolic: ${document.getElementById('avgSystolic').textContent}\nAverage Diastolic: ${document.getElementById('avgDiastolic').textContent}\n`;

      const subject='Blood Pressure Readings (uk-email-1.1)';
      const to='crofton.admin@nhs.net';
      const mailto=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      // cache-busting trick for some mail clients that re-use draft windows
      setTimeout(()=>{ window.location.href = mailto; }, 50);
    }
  </script>
</body>
</html>
